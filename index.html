<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me Player Ultra - G5 Velocity Engine</title>
    <style>
        /* Base Styling */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        /* The Main Video Container - The "Safe Zone" */
        #main-stage {
            position: absolute;
            top: 5%; left: 5%; width: 90%; height: 90%;
            z-index: 50; /* Above the background ads */
            background: #000;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            display: flex; align-items: center; justify-content: center;
        }
        iframe#player { width: 100%; height: 100%; border: none; }

        /* Ghost Ad Frame Styling */
        .ghost-zone {
            position: absolute;
            pointer-events: none; /* User clicks through to the player */
            overflow: hidden;
            z-index: 10; /* Below the main stage */
            transition: transform 10s linear;
        }

        /* HUD for Monitoring (Auto-hides) */
        #hud {
            position: fixed; top: 10px; left: 10px; color: #00ff00;
            background: rgba(0,0,0,0.7); padding: 8px; font-size: 11px;
            border-radius: 5px; z-index: 100; border: 1px solid #333;
        }
    </style>
</head>
<body>

    <div id="hud">System: Initializing Hardware Sync...</div>

    <div id="main-stage">
        <iframe id="player" src="https://www.youtube.com/embed/LIVE_STREAM_ID" allowfullscreen></iframe>
    </div>

    <div id="perimeter-matrix"></div>

    <script>
        // --- [ADSTERRA CONFIG] ---
        // Fill these with your actual Tag IDs from Adsterra
        const TAG_POOL = ["tag_1", "tag_2", "tag_3", "tag_4", "tag_5", "tag_6"];

        // --- [ADAPTIVE ENGINE] ---
        function detectHardware() {
            const ram = navigator.deviceMemory || 4;
            const isTV = /SmartTV|Android TV|GoogleTV/i.test(navigator.userAgent);
            
            if (ram >= 8 && !isTV) {
                return { name: "PC_BLITZ", splitCount: 3, layers: 2, opacity: 0.12 }; // 24 Ads Perimeter
            } else {
                return { name: "TV_STABLE", splitCount: 2, layers: 1, opacity: 0.15 }; // 8 Ads Perimeter
            }
        }

        const config = detectHardware();
        document.getElementById('hud').innerText = `PROFILE: ${config.name} | G5 ACTIVE | OPACITY: ${config.opacity * 100}%`;

        // --- [MATRIX DEPLOYMENT] ---
        function createZone(side, posIndex, layerNum) {
            const zone = document.createElement('div');
            zone.className = 'ghost-zone';
            zone.style.opacity = config.opacity;
            
            // Layout Logic: Divide each side into splitCount zones
            const size = 100 / config.splitCount;
            const offset = posIndex * size;

            if (side === 'top') {
                zone.style.top = '0'; zone.style.left = offset + '%';
                zone.style.width = size + '%'; zone.style.height = '10%';
            } else if (side === 'bottom') {
                zone.style.bottom = '0'; zone.style.left = offset + '%';
                zone.style.width = size + '%'; zone.style.height = '10%';
            } else if (side === 'left') {
                zone.style.left = '0'; zone.style.top = offset + '%';
                zone.style.width = '10%'; zone.style.height = size + '%';
            } else if (side === 'right') {
                zone.style.right = '0'; zone.style.top = offset + '%';
                zone.style.width = '10%'; zone.style.height = size + '%';
            }

            // Inject Adsterra Script (Standard Invoke)
            const tag = TAG_POOL[Math.floor(Math.random() * TAG_POOL.length)];
            const adScript = document.createElement('script');
            adScript.type = 'text/javascript';
            adScript.src = `//pl2345678.highperformanceformat.com/${tag}/invoke.js`; 
            
            zone.appendChild(adScript);
            document.getElementById('perimeter-matrix').appendChild(zone);
        }

        function launchEngine() {
            const sides = ['top', 'bottom', 'left', 'right'];
            for (let l = 0; l < config.layers; l++) {
                sides.forEach(side => {
                    for (let s = 0; s < config.splitCount; s++) {
                        // Staggered boot to avoid browser freeze
                        setTimeout(() => {
                            createZone(side, s, l);
                        }, (l * 1000) + (s * 200));
                    }
                });
            }
        }

        // --- [HUMAN-FLOW SIMULATION] ---
        // Jitters the ads slightly to bypass static-view detection
        setInterval(() => {
            const zones = document.querySelectorAll('.ghost-zone');
            zones.forEach(z => {
                const move = (Math.random() * 4) - 2;
                z.style.transform = `translate(${move}px, ${move}px)`;
            });
        }, 12000);

        // Start when ready
        window.onload = launchEngine;
    </script>
</body>
</html>
