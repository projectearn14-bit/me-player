<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me Player - Safe-Zone Blitz</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }

        /* [THE MASK] - Middle 100% Visible, Sides 12% Opacity */
        #ad-underlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
        }

        #main-stage {
            position: absolute;
            top: 10%; left: 10%; width: 80%; height: 80%;
            z-index: 100; /* Highest layer for 100% visibility */
            background: #000;
            box-shadow: 0 0 50px #000;
        }
        iframe#player { width: 100%; height: 100%; border: none; }

        .ghost-unit {
            position: absolute;
            pointer-events: none;
            overflow: hidden;
            opacity: 0.12; /* Only the perimeter is dimmed */
            transition: transform 5s ease;
        }
    </style>
</head>
<body>

    <div id="main-stage">
        <iframe id="player" src="http://googleusercontent.com/youtube.com/8" allowfullscreen></iframe>
    </div>

    <div id="ad-underlay"></div>

    <script>
        const TAGS = ["your_tag_1", "your_tag_2"]; // Add all your tags here

        function getSpec() {
            const ram = navigator.deviceMemory || 4;
            return (ram >= 8) ? { instances: 12, splits: 4 } : { instances: 4, splits: 2 };
        }

        const spec = getSpec();

        function spawnAd(side, pos) {
            const div = document.createElement('div');
            div.className = 'ghost-unit';
            const size = 100 / spec.splits;
            const offset = pos * size;

            // Positioning only in the 10% "Doughnut" perimeter
            if (side==='top') { div.style.top='0'; div.style.left=offset+'%'; div.style.width=size+'%'; div.style.height='10%'; }
            if (side==='bottom') { div.style.bottom='0'; div.style.left=offset+'%'; div.style.width=size+'%'; div.style.height='10%'; }
            if (side==='left') { div.style.left='0'; div.style.top=offset+'%'; div.style.width='10%'; div.style.height=size+'%'; }
            if (side==='right') { div.style.right='0'; div.style.top=offset+'%'; div.style.width='10%'; div.style.height=size+'%'; }

            const tag = TAGS[Math.floor(Math.random()*TAGS.length)];
            const s = document.createElement('script');
            s.src = `//pl2345678.highperformanceformat.com/${tag}/invoke.js`; 
            div.appendChild(s);
            document.getElementById('ad-underlay').appendChild(div);
        }

        function init() {
            const sides = ['top', 'bottom', 'left', 'right'];
            for(let i=0; i < spec.instances; i++) {
                sides.forEach(side => {
                    for(let p=0; p < spec.splits; p++) {
                        setTimeout(() => spawnAd(side, p), (i*300) + (p*100));
                    }
                });
            }
        }

        window.onload = init;
    </script>
</body>
</html>
