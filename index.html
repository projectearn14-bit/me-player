
<!DOCTYPE html>
<html>
<head>
    <title>P12: Velocity Player</title>
    <style>
        body { margin:0; background:#000; overflow:hidden; font-family:sans-serif; }
        .ad-zone { position:fixed; z-index:100; opacity:0.3; background:#111; }
        .t { top:0; width:100%; height:80px; } .b { bottom:0; width:100%; height:80px; }
        .l { left:0; top:80px; bottom:80px; width:150px; } .r { right:0; top:80px; bottom:80px; width:150px; }
        #video-core { position:absolute; inset:90px 160px; z-index:10; }
        #revenue-trigger { position:absolute; inset:0; z-index:200; cursor:pointer; }
    </style>
</head>
<body>
    <div class="ad-zone t"> </div>
    <div class="ad-zone l"> </div>
    <div class="ad-zone r"> </div>
    <div class="ad-zone b"> </div>
    <div id="video-core">
        <div id="revenue-trigger" onclick="window.open('YOUR_SMARTLINK_URL', '_blank'); this.style.display='none';"></div>
        <iframe src="https://www.youtube.com/embed/videoseries?list=YOUR_PLAYLIST_ID" width="100%" height="100%" frameborder="0"></iframe>
    </div>
</body>
</html>
